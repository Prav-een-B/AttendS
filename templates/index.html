<!DOCTYPE html>
<html>
<head>
    <title>Attendance Extractor</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <h1>Attendance Sheet Extractor</h1>

    <div class="box">
        <p class="cnn-status" style="color: {% if cnn_ready %}green{% else %}red{% endif %}">
            CNN Model: {% if cnn_ready %}Loaded ✓{% else %}Not found - using Tesseract{% endif %}
        </p>
    </div>

    <div class="box">
        <h3>Upload Image</h3>
        <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.bmp,.tiff,.webp" multiple>
        <br>
        <button onclick="upload()">Extract</button>
        <p id="status"></p>
    </div>

    <div class="box" id="results-box" style="display:none;">
        <h3>Results</h3>
        <div id="results"></div>
        <button id="download-btn" onclick="download()">Download Excel</button>
    </div>

    <script>
        let filename = "";

        function upload() {
            const files = document.getElementById("fileInput").files;
            if (files.length === 0) {
                alert("Please select a file.");
                return;
            }

            document.getElementById("status").innerText = "Processing...";

            const formData = new FormData();
            for (let f of files) formData.append("files", f);

            fetch("/process", { method: "POST", body: formData })
                .then(r => r.json())
                .then(data => {
                    document.getElementById("status").innerText = "";
                    if (!data.success) {
                        document.getElementById("status").innerText = "Error: " + data.error;
                        return;
                    }
                    filename = data.filename;
                    showResults(data.sheets);
                })
                .catch(() => {
                    document.getElementById("status").innerText = "Something went wrong.";
                });
        }

        function showResults(sheets) {
            document.getElementById("results-box").style.display = "block";
            const div = document.getElementById("results");
            div.innerHTML = "";

            for (let sheet of sheets) {
                let html = "<h4>" + sheet.source + "</h4>";
                html += "<p>Total: " + sheet.stats.total + " | Engine: " + sheet.engine + "</p>";
                html += "<table><tr><th>#</th><th>Roll Number</th><th>Name</th><th>Status</th></tr>";
                for (let r of sheet.records) {
                    html += "<tr><td>" + r.serial + "</td><td>" + r.roll_number + "</td><td>" + r.name + "</td><td>" + r.status + "</td></tr>";
                }
                html += "</table>";
                div.innerHTML += html;
            }

            document.getElementById("download-btn").style.display = "inline-block";
        }

        function download() {
            window.location.href = "/download/" + filename;
        }
    </script>

</body>
</html>
